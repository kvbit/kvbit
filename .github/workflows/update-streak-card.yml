name: Update Streak Card

on:
  schedule:
    - cron: "0 8 * * *"
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/update-streak-card.yml"

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch streak card SVG
        run: |
          curl -fsSL --max-time 120 \
            "https://github-readme-streak-stats.herokuapp.com/?user=kvbit&hide_border=true&background=020208&ring=22D3EE&fire=8B5CF6&currStreakNum=FAFAFA&sideNums=A1A1AA&currStreakLabel=71717A&sideLabels=52525B&dates=3F3F46" \
            -o assets/streak-card.svg
          test -s assets/streak-card.svg

      - name: Commit streak card
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: refresh streak card SVG"
          file_pattern: assets/streak-card.svg
