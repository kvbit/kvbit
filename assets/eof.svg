<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="140" viewBox="0 0 1200 140" fill="none" role="img" aria-label="End of transmission.">
  <!-- EOF &#8212; graceful shutdown -->
  <defs>
    <linearGradient id="eofLine" x1="0" y1="0" x2="1" y2="0">
      <stop stop-color="#22D3EE" stop-opacity="0"/><stop offset=".5" stop-color="#8B5CF6" stop-opacity=".8"/><stop offset="1" stop-color="#22D3EE" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="140" fill="#020208"/>
  <rect x="200" y="40" width="800" height="1" fill="url(#eofLine)"/>
  <text x="600" y="82" text-anchor="middle" fill="#3F3F46" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="12">kvbit@core:~$ shutdown --until next-commit</text>
  <text x="600" y="112" text-anchor="middle" fill="#27272A" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="10" letter-spacing="4">EOF &#8212; HANDCRAFTED SVG &#183; NO TEMPLATES &#183; &#169; JAHANGIR AHMAD</text>
  <circle cx="600" cy="128" r="2" fill="#22D3EE">
    <animate attributeName="opacity" values="1;.2;1" dur="3s" repeatCount="indefinite"/>
  </circle>
</svg>
