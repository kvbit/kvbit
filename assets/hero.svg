<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="1200" height="440" viewBox="0 0 1200 440" fill="none" role="img" aria-label="Jahangir Ahmad profile hero">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#fff" stroke-opacity="0.03" stroke-width="0.5"/>
    </pattern>
    <filter id="blur80"><feGaussianBlur stdDeviation="80"/></filter>
    <radialGradient id="a" cx="0" cy="0" r="1" gradientTransform="matrix(0 280 -280 0 120 100)"><stop stop-color="#22D3EE" stop-opacity=".18"/><stop offset="1" stop-opacity="0"/></radialGradient>
    <radialGradient id="b" cx="0" cy="0" r="1" gradientTransform="matrix(0 320 -320 0 720 0)"><stop stop-color="#8B5CF6" stop-opacity=".16"/><stop offset="1" stop-opacity="0"/></radialGradient>
    <linearGradient id="iris" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#22D3EE"/><stop offset=".5" stop-color="#8B5CF6"/><stop offset="1" stop-color="#F472B6"/></linearGradient>
    <linearGradient id="title" x1="64" y1="0" x2="640" y2="0"><stop stop-color="#FFF"/><stop offset=".55" stop-color="#E4E4E7"/><stop offset="1" stop-color="#67E8F9"/></linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0"><stop stop-color="#22D3EE"/><stop offset=".5" stop-color="#8B5CF6"/><stop offset="1" stop-color="#F472B6" stop-opacity="0"/></linearGradient>
    <clipPath id="round"><rect width="1200" height="440" rx="24"/></clipPath>
    <clipPath id="av"><circle cx="1048" cy="200" r="76"/></clipPath>
  </defs>
  <g clip-path="url(#round)">
    <rect width="1200" height="440" fill="#040408"/>
    <rect width="1200" height="440" fill="url(#grid)"/>
    <ellipse cx="120" cy="100" rx="280" ry="200" fill="url(#a)" filter="url(#blur80)"/>
    <ellipse cx="720" cy="0" rx="320" ry="240" fill="url(#b)" filter="url(#blur80)"/>
    <rect x="48" y="48" width="1104" height="344" rx="20" fill="#fff" fill-opacity=".015" stroke="url(#iris)" stroke-opacity=".25" stroke-width="1"/>
  </g>
  <circle cx="1048" cy="200" r="84" fill="none" stroke="url(#iris)" stroke-width="2.5" stroke-dasharray="8 6" opacity=".85">
    <animateTransform attributeName="transform" type="rotate" from="0 1048 200" to="360 1048 200" dur="24s" repeatCount="indefinite"/>
  </circle>
  <circle cx="1048" cy="200" r="80" fill="#0C0C12" stroke="url(#iris)" stroke-width="2"/>
  <image href="https://github.com/kvbit.png" x="968" y="120" width="160" height="160" clip-path="url(#av)" preserveAspectRatio="xMidYMid slice"/>
  <rect x="80" y="80" width="148" height="34" rx="17" fill="#fff" fill-opacity=".04" stroke="url(#iris)" stroke-opacity=".35" stroke-width="1"/>
  <circle cx="98" cy="97" r="5" fill="#34D399"><animate attributeName="opacity" values="1;.3;1" dur="2.2s" repeatCount="indefinite"/></circle>
  <text x="112" y="102" fill="#D4D4D8" font-family="ui-monospace,Menlo,monospace" font-size="11" letter-spacing="1.8">OPEN TO WORK</text>
  <text x="80" y="196" fill="url(#title)" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,system-ui,sans-serif" font-size="64" font-weight="700" letter-spacing="-2.6">Jahangir Ahmad</text>
  <text x="80" y="248" fill="#A1A1AA" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,system-ui,sans-serif" font-size="22" letter-spacing="-.4">Backend Engineer</text>
  <text x="318" y="248" fill="#3F3F46" font-size="22">/</text>
  <text x="338" y="248" fill="url(#iris)" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,system-ui,sans-serif" font-size="22" font-weight="600">Platform APIs</text>
  <text x="80" y="292" fill="#52525B" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,system-ui,sans-serif" font-size="17">I build reliable APIs, data layers, and backend systems</text>
  <text x="80" y="318" fill="#52525B" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,system-ui,sans-serif" font-size="17">that scale cleanly and stay maintainable in production.</text>
  <rect x="80" y="344" width="420" height="2" rx="1" fill="url(#line)"/>
  <text x="80" y="388" fill="#3F3F46" font-family="ui-monospace,Menlo,monospace" font-size="12">jahangir@studio137.co.za</text>
  <text x="320" y="388" fill="#27272A" font-size="12">/</text>
  <text x="340" y="388" fill="#3F3F46" font-family="ui-monospace,Menlo,monospace" font-size="12">Srinagar, J&amp;K</text>
  <text x="500" y="388" fill="#27272A" font-size="12">/</text>
  <text x="520" y="388" fill="#3F3F46" font-family="ui-monospace,Menlo,monospace" font-size="12">UTC+5:30</text>
</svg>
