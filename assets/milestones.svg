<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="340" viewBox="0 0 1200 340" fill="none" role="img" aria-label="Milestones &#8212; production platform shipped, thirty prototypes in thirty days, one hundred day public log, flagship code judge.">
  <!-- 09 // MILESTONES &#8212; a constellation of unlocked achievements -->
  <rect width="1200" height="340" fill="#020208"/>

  <text x="600" y="56" text-anchor="middle" fill="#3F3F46" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="10" letter-spacing="8">09 &#8212; MILESTONES</text>

  <!-- constellation lines -->
  <g stroke="#1F1F26" stroke-width="1">
    <path d="M200 220 L440 130 L720 200 L980 120"/>
    <path d="M440 130 L720 200" stroke-dasharray="3 5"/>
  </g>
  <!-- traveling spark along the constellation -->
  <circle r="2.2" fill="#67E8F9">
    <animateMotion path="M200 220 L440 130 L720 200 L980 120" dur="8s" repeatCount="indefinite"/>
  </circle>

  <!-- star 1 -->
  <g transform="translate(200 220)">
    <path d="M0 -8 L2.2 -2.2 L8 0 L2.2 2.2 L0 8 L-2.2 2.2 L-8 0 L-2.2 -2.2 Z" fill="#22D3EE">
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="18s" repeatCount="indefinite"/>
    </path>
    <text y="34" text-anchor="middle" fill="#E4E4E7" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif" font-size="15" font-weight="600">Platform in production</text>
    <text y="54" text-anchor="middle" fill="#52525B" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="11">bcw @ studio137</text>
  </g>

  <!-- star 2 -->
  <g transform="translate(440 130)">
    <path d="M0 -9 L2.5 -2.5 L9 0 L2.5 2.5 L0 9 L-2.5 2.5 L-9 0 L-2.5 -2.5 Z" fill="#8B5CF6">
      <animateTransform attributeName="transform" type="rotate" from="360" to="0" dur="22s" repeatCount="indefinite"/>
    </path>
    <text y="-26" text-anchor="middle" fill="#E4E4E7" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif" font-size="15" font-weight="600">30 builds / 30 days</text>
    <text y="32" text-anchor="middle" fill="#52525B" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="11">velocity unlocked</text>
  </g>

  <!-- star 3 -->
  <g transform="translate(720 200)">
    <path d="M0 -8 L2.2 -2.2 L8 0 L2.2 2.2 L0 8 L-2.2 2.2 L-8 0 L-2.2 -2.2 Z" fill="#34D399">
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="20s" repeatCount="indefinite"/>
    </path>
    <text y="36" text-anchor="middle" fill="#E4E4E7" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif" font-size="15" font-weight="600">100-day public log</text>
    <text y="56" text-anchor="middle" fill="#52525B" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="11">consistency proven</text>
  </g>

  <!-- star 4 -->
  <g transform="translate(980 120)">
    <path d="M0 -10 L2.8 -2.8 L10 0 L2.8 2.8 L0 10 L-2.8 2.8 L-10 0 L-2.8 -2.8 Z" fill="#67E8F9">
      <animateTransform attributeName="transform" type="rotate" from="360" to="0" dur="16s" repeatCount="indefinite"/>
    </path>
    <text y="-24" text-anchor="middle" fill="#E4E4E7" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif" font-size="15" font-weight="600">Arclight &#8212; flagship judge</text>
    <text y="34" text-anchor="middle" fill="#52525B" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="11">systems over demos</text>
  </g>

  <!-- ambient dust -->
  <g fill="#3F3F46">
    <circle cx="120" cy="100" r="1"><animate attributeName="opacity" values=".8;.2;.8" dur="4s" repeatCount="indefinite"/></circle>
    <circle cx="580" cy="290" r="1"><animate attributeName="opacity" values=".2;.8;.2" dur="5s" repeatCount="indefinite"/></circle>
    <circle cx="860" cy="270" r="1"><animate attributeName="opacity" values=".7;.15;.7" dur="3.4s" repeatCount="indefinite"/></circle>
    <circle cx="1100" cy="240" r="1"><animate attributeName="opacity" values=".2;.9;.2" dur="4.6s" repeatCount="indefinite"/></circle>
    <circle cx="320" cy="300" r="1"><animate attributeName="opacity" values=".8;.25;.8" dur="5.4s" repeatCount="indefinite"/></circle>
  </g>

  <text x="600" y="322" text-anchor="middle" fill="#27272A" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="10" letter-spacing="3">MORE STARS FORMING &#8212; CHECK BACK SOON</text>
</svg>
