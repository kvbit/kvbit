<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="300" viewBox="0 0 1200 300" fill="none" role="img" aria-label="Mission &#8212; build backend systems that stay correct, observable and maintainable under real production load.">
  <!-- 02 // MISSION &#8212; single centered statement inside converging energy lines -->
  <defs>
    <linearGradient id="msL" x1="0" y1="0" x2="1" y2="0">
      <stop stop-color="#22D3EE" stop-opacity="0"/><stop offset="1" stop-color="#22D3EE" stop-opacity=".7"/>
    </linearGradient>
    <linearGradient id="msR" x1="1" y1="0" x2="0" y2="0">
      <stop stop-color="#8B5CF6" stop-opacity="0"/><stop offset="1" stop-color="#8B5CF6" stop-opacity=".7"/>
    </linearGradient>
    <linearGradient id="msT" x1="0" y1="0" x2="1200" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#67E8F9"/><stop offset=".5" stop-color="#FAFAFA"/><stop offset="1" stop-color="#C4B5FD"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="300" fill="#020208"/>

  <!-- converging energy lines -->
  <g stroke-width="1">
    <path d="M0 60 Q 380 60 520 128" stroke="url(#msL)"/>
    <path d="M0 240 Q 380 240 520 176" stroke="url(#msL)"/>
    <path d="M1200 60 Q 820 60 680 128" stroke="url(#msR)"/>
    <path d="M1200 240 Q 820 240 680 176" stroke="url(#msR)"/>
  </g>
  <circle r="2.4" fill="#22D3EE"><animateMotion path="M0 60 Q 380 60 520 128" dur="4s" repeatCount="indefinite"/></circle>
  <circle r="2.4" fill="#22D3EE"><animateMotion path="M0 240 Q 380 240 520 176" dur="5.2s" repeatCount="indefinite"/></circle>
  <circle r="2.4" fill="#8B5CF6"><animateMotion path="M1200 60 Q 820 60 680 128" dur="4.6s" repeatCount="indefinite"/></circle>
  <circle r="2.4" fill="#8B5CF6"><animateMotion path="M1200 240 Q 820 240 680 176" dur="5.8s" repeatCount="indefinite"/></circle>

  <text x="600" y="88" text-anchor="middle" fill="#3F3F46" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="10" letter-spacing="8">02 &#8212; MISSION</text>

  <text x="600" y="148" text-anchor="middle" fill="url(#msT)" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif" font-size="42" font-weight="700" letter-spacing="-1.2">Make correctness boring.</text>
  <text x="600" y="184" text-anchor="middle" fill="url(#msT)" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif" font-size="42" font-weight="700" letter-spacing="-1.2">Make failure loud. Make change safe.</text>

  <text x="600" y="232" text-anchor="middle" fill="#52525B" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif" font-size="15">APIs, data layers and platform services engineered to survive traffic, time, and the next engineer.</text>

  <g transform="translate(600 264)">
    <circle r="3" fill="none" stroke="#22D3EE" stroke-opacity=".6" stroke-width="1">
      <animate attributeName="r" values="3;10" dur="2.6s" repeatCount="indefinite"/>
      <animate attributeName="stroke-opacity" values=".6;0" dur="2.6s" repeatCount="indefinite"/>
    </circle>
    <circle r="2" fill="#22D3EE"/>
  </g>
</svg>
