<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="320" viewBox="0 0 1200 320" fill="none" role="img" aria-label="Uplink &#8212; open a channel: mailboxmelted@gmail.com or github.com/kvbit.">
  <!-- 11 // UPLINK &#8212; transmission dish broadcasting an open channel -->
  <defs>
    <linearGradient id="upBeam" x1="0" y1="1" x2="1" y2="0">
      <stop stop-color="#22D3EE" stop-opacity=".5"/><stop offset="1" stop-color="#8B5CF6" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="upTitle" x1="0" y1="0" x2="1" y2="0">
      <stop stop-color="#FAFAFA"/><stop offset="1" stop-color="#C4B5FD"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="320" fill="#020208"/>

  <!-- dish + beam, left -->
  <g transform="translate(150 210)">
    <path d="M-44 6 A48 42 0 0 1 44 6 L0 -12 Z" fill="none" stroke="#3F3F46" stroke-width="1.4"/>
    <line x1="0" y1="6" x2="0" y2="52" stroke="#3F3F46" stroke-width="1.4"/>
    <line x1="-22" y1="52" x2="22" y2="52" stroke="#3F3F46" stroke-width="1.4"/>
    <path d="M0 -14 L560 -168" stroke="url(#upBeam)" stroke-width="1.6"/>
    <circle r="3" fill="#67E8F9">
      <animateMotion path="M0 -14 L560 -168" dur="2.6s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="1;1;0" keyTimes="0;.85;1" dur="2.6s" repeatCount="indefinite"/>
    </circle>
    <circle cy="-14" r="4" fill="none" stroke="#22D3EE" stroke-width="1">
      <animate attributeName="r" values="4;18" dur="2.6s" repeatCount="indefinite"/>
      <animate attributeName="stroke-opacity" values=".8;0" dur="2.6s" repeatCount="indefinite"/>
    </circle>
  </g>

  <text x="64" y="300" fill="#27272A" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="10" letter-spacing="4">TX 34.08N 74.79E</text>

  <!-- message, right-weighted -->
  <text x="1136" y="84" text-anchor="end" fill="#3F3F46" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="10" letter-spacing="8">11 &#8212; UPLINK</text>
  <text x="1136" y="150" text-anchor="end" fill="url(#upTitle)" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif" font-size="52" font-weight="800" letter-spacing="-2">The channel is open.</text>
  <text x="1136" y="186" text-anchor="end" fill="#52525B" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif" font-size="16">Interesting backend problems, collaborations, and hard questions welcome.</text>

  <g font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="14" text-anchor="end">
    <text x="1136" y="234" fill="#67E8F9">mailboxmelted@gmail.com</text>
    <text x="1136" y="262" fill="#A1A1AA">github.com/kvbit</text>
  </g>
  <circle cx="880" cy="229" r="3.5" fill="#34D399">
    <animate attributeName="opacity" values="1;.3;1" dur="2s" repeatCount="indefinite"/>
  </circle>
  <text x="866" y="234" text-anchor="end" fill="#34D399" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="11">ACK expected &lt; 24h</text>
</svg>
